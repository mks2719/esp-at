<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EVOLVE</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:linear-gradient(135deg,#e8f5f2,#fff)}.home-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 10px}.brand{font-size:40px;color:#046a53;font-weight:700;letter-spacing:1px;margin-bottom:15px}.brand .black-o{color:#000}.tm{font-size:12px;vertical-align:super;color:#000}.content{width:100%;max-width:360px;padding:22px;border-radius:18px;background:rgba(255,255,255,.95);box-shadow:0 8px 25px rgba(0,0,0,.08);margin-bottom:40px}.section-title{font-size:17px;color:#333;margin-bottom:15px;font-weight:700;text-align:center}.device-item{margin-bottom:14px}.device-item input{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;font-size:14px;transition:.25s}.device-item input:focus{border-color:#046a53;outline:0;box-shadow:0 0 0 2px rgba(4,106,83,.1)}#message{text-align:center;font-size:13px;color:#046a53;padding:8px;background:#f2f8f7;border-radius:8px}button{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;cursor:pointer;transition:.25s}.btn-wrap button{background:#046a53;color:#fff}.btn-wrap button:hover{background:#035942;transform:translateY(-1px)}.scan-btn{margin-top:10px;background:#fff;border:1px solid #046a53;color:#046a53}.scan-btn:hover{background:#046a53;color:#fff}.wifi-list{border-radius:10px;max-height:140px;overflow:auto;margin-top:10px;display:none;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08)}.wifi-item{padding:10px;border-bottom:1px solid #eee;cursor:pointer;transition:.2s}.wifi-item:hover{background:#f2f8f7}.wifi-item:active{background:#e0f0ec}@media (max-height:600px){.home-wrap{justify-content:flex-start;padding-top:20px;padding-bottom:20px}}</style></head><body><div class="home-wrap"><div class="brand">EV<span class="black-o">O</span>LVE<span class="tm">TM</span></div><div class="content"><div class="section-title">Wi-Fi Credentials</div><div class="device-item"><input id="ssid" placeholder="SSID"></div><div class="device-item"><input id="password" type="password" placeholder="Password"></div><div id="message">Ready</div><div class="btn-wrap"><button onclick="postData()">Connect</button></div><button class="scan-btn" onclick="scanWifi()">Scan Wi-Fi</button><div id="wifiList" class="wifi-list"></div></div></div><script>function g(e){return document.getElementById(e)}function get(e,n){var t=new XMLHttpRequest;t.open("GET",e,!0),t.onreadystatechange=function(){4==t.readyState&&(200==t.status?n(t.responseText):g("message").innerText="Request failed")},t.send()}function post(e,n,t){var s=new XMLHttpRequest;s.open("POST",e,!0),s.setRequestHeader("Content-Type","application/json"),s.onreadystatechange=function(){4==s.readyState&&(200==s.status?t(s.responseText):g("message").innerText="Connect failed")},s.send(n)}function getData(){get("/getstainfo",function(e){try{var n=JSON.parse(e);g("ssid").value=n.sta_ssid||"",g("password").value=n.sta_password||"",g("message").innerText=n.message||"Ready"}catch(e){}})}function scanWifi(){g("message").innerText="Scanning...",get("/getaprecord",function(e){try{var n=JSON.parse(e),t=g("wifiList");if(!n.aplist)return void(g("message").innerText="Scan failed");t.innerHTML="",t.style.display="block";for(var s=0;s<n.aplist.length&&s<10;s++){var a=document.createElement("div");a.className="wifi-item",a.innerHTML=n.aplist[s].ssid,a.onclick=function(){g("ssid").value=this.innerHTML,t.style.display="none"},t.appendChild(a)}g("message").innerText="Select Wi-Fi"}catch(e){g("message").innerText="Error"}})}function postData(){var e=g("ssid").value,n=g("password").value;if(e){g("message").innerText="Connecting...";var t={ssid_len:e.length,ssid:e,password_len:n.length,password:n};post("/setstainfo",JSON.stringify(t),function(e){try{var n=JSON.parse(e);g("message").innerText=n.message||"Done"}catch(e){g("message").innerText="Connected"}})}else g("message").innerText="Enter SSID"}getData()</script></body></html>
