<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLVE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#e8f5f2,#fff)}

.home-wrap{
display:flex;flex-direction:column;align-items:center;
justify-content:flex-start;min-height:100vh;padding:80px 10px
}

.brand{font-size:40px;color:#046a53;font-weight:700;margin-bottom:15px}
.black-o{color:#000}
.tm{font-size:14px;vertical-align:super;color:#000;position:relative;top:-4px}

.content{
width:100%;max-width:360px;padding:22px;border-radius:18px;
background:#fff;box-shadow:0 8px 25px rgba(0,0,0,.08)
}

input{
width:100%;padding:12px;margin-bottom:10px;
border-radius:10px;border:1px solid #ddd
}

/* Password field */
.password-wrap{position:relative}
.password-wrap input{padding-right:60px}

.toggle-eye{
position:absolute;right:10px;top:50%;
transform:translateY(-80%);
cursor:pointer;font-size:13px;
color:#046a53;font-weight:600
}

.toggle-eye:active{
transform:translateY(-80%) scale(0.95)
}

#message{
text-align:center;font-size:13px;color:#046a53;
padding:8px;background:#f2f8f7;border-radius:8px;margin-bottom:12px
}

button{
width:100%;padding:12px;border:none;border-radius:10px;
background:#046a53;color:#fff;margin-bottom:8px
}

.scan-btn{
background:#fff;color:#046a53;border:1px solid #046a53
}

.scan-btn:active{
background:#046a53;color:#fff
}

/* Bottom sheet */
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.2);display:none
}

.wifi-list{
position:fixed;left:0;bottom:0;width:100%;
max-height:45%;background:#fff;
border-top-left-radius:16px;border-top-right-radius:16px;
box-shadow:0 -5px 20px rgba(0,0,0,.2);
overflow:auto;display:none;
transition:.3s;
transform:translateY(100%);
}

.wifi-item{
padding:14px;border-bottom:1px solid #eee;
text-align:center;cursor:pointer
}

.wifi-item:hover{background:#eee}
.wifi-item:active{background:#ddd}

.handle{
width:40px;height:4px;background:#ccc;
border-radius:2px;margin:10px auto
}

.title{
text-align:center;font-size:16px;
font-weight:700;color:#046a53;margin-bottom:18px
}
</style>
</head>

<body>

<div class="home-wrap">

<div class="brand">
EV<span class="black-o">O</span>LVE<span class="tm">TM</span>
</div>

<div class="content">
<h3 class="title">WIFI CREDENTIALS</h3>

<input id="ssid" placeholder="SSID">

<div class="password-wrap">
<input id="password" placeholder="Password" type="password">
<span class="toggle-eye" onclick="togglePassword()">Show</span>
</div>

<div id="message">Ready</div>

<button onclick="postData()">Connect</button>
<button onclick="scanWifi()" class="scan-btn">Scan Wi-Fi</button>

</div>
</div>

<div class="overlay" id="overlay" onclick="closeList()"></div>
<div class="wifi-list" id="wifiList">
<div class="handle"></div>
</div>

<script>
function g(e){return document.getElementById(e)}

/* Toggle password */
function togglePassword(){
var p=g("password");
var t=document.querySelector(".toggle-eye");

if(p.type==="password"){
p.type="text";
t.innerText="Hide";
}else{
p.type="password";
t.innerText="Show";
}
}

/* HTTP GET */
function get(e,n){
var t=new XMLHttpRequest;
t.open("GET",e,true);
t.onreadystatechange=function(){
if(t.readyState===4){
if(t.status===200)n(t.responseText);
else g("message").innerText="Request failed";
}
};
t.send();
}

/* HTTP POST */
function post(e,n,t){
var s=new XMLHttpRequest;
s.open("POST",e,true);
s.setRequestHeader("Content-Type","application/json");
s.onreadystatechange=function(){
if(s.readyState===4){
if(s.status===200)t(s.responseText);
else g("message").innerText="Connect failed";
}
};
s.send(n);
}

/* Bottom sheet controls */
function openList(){
g("wifiList").style.display="block";
g("overlay").style.display="block";
g("wifiList").style.transform="translateY(0)";
}

function closeList(){
var b=g("wifiList");
b.style.transform="translateY(100%)";
setTimeout(()=>{
b.style.display="none";
g("overlay").style.display="none";
},200);
}

/* Show WiFi list */
function showList(arr){
var t=g("wifiList");
t.innerHTML='<div class="handle"></div>';
openList();

for(var i=0;i<arr.length;i++){
var a=document.createElement("div");
a.className="wifi-item";
a.innerHTML=arr[i];

a.onclick=function(){
g("ssid").value=this.innerHTML;
this.style.background="#046a53";
this.style.color="#fff";
setTimeout(closeList,200);
};

t.appendChild(a);
}
}

/* Scan WiFi */
function scanWifi(){
g("message").innerText="Scanning...";

get("/getaprecord",function(e){
try{
var n=JSON.parse(e);
if(!n.aplist){
g("message").innerText="Scan failed";
return;
}

var arr=[];
for(var i=0;i<n.aplist.length && i<10;i++){
arr.push(n.aplist[i].ssid);
}

if(arr.length===0){
g("message").innerText="No Wi-Fi found";
return;
}

showList(arr);
g("message").innerText="Select Wi-Fi";

}catch(e){
g("message").innerText="Error";
}
});
}

/* Send credentials */
function postData(){
var e=g("ssid").value;
var n=g("password").value;

if(e){
g("message").innerText="Connecting...";

var t={
ssid_len:e.length,
ssid:e,
password_len:n.length,
password:n
};

post("/setstainfo",JSON.stringify(t),function(e){
try{
var n=JSON.parse(e);
g("message").innerText=n.message||"Done";
}catch(e){
g("message").innerText="Connected";
}
});
}else{
g("message").innerText="Enter SSID";
}
}
</script>

</body>
</html>
